<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virus Cure Solver</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; }
        .sc-label { display: block; padding: 8px; background: #334155; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .sc-label:hover { background: #475569; }
        input[type="checkbox"] { margin-right: 10px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .controls { margin-bottom: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        #results { margin-top: 20px; }
        b { color: #60a5fa; }
    </style>
</head>
<body>

    <h2>Target Symptoms</h2>
    <div class="grid" id="checkboxGroup"></div>

    <div class="controls">
        Max Ingredients: <input type="number" id="maxIng" value="60" style="width: 50px;">
        Recipes to find: <input type="number" id="limit" value="5" style="width: 50px;">
        <button onclick="solve()">Generate Formulas</button>
    </div>

    <div id="results"></div>

    <script>
        const ingredientTable = {
            "Dermatrix": {"Eye Irritation": 5, "Skin Rash": 10, "Sneezing": -5},
            "Neurovex": {"Fainting": -5, "Migraine": -5, "Hallucinations": 15},
            "Morvexis": {"Sneezing": -5, "Cough": 15},
            "Oculyte": {"Eye Irritation": 10, "Skin Rash": -5},
            "Lumicet": {"Migraine": -5, "Eye Irritation": 15},
            "Bronchex": {"Cough": 10, "Sore Throat": -5},
            "Myocordin": {"Fatigue": -5, "Paralysis": 5, "Muscle Pain": 10},
            "Hallucor": {"Fainting": -5, "Hallucinations": 15},
            "Virexon": {"Nausea": 15, "Vomiting": -5},
            "Organex": {"Coma": -5, "Organ Failure": 15},
            "Velmorin": {"Fatigue": 10, "Fever": -5},
            "Trivexol": {"Chills": -5, "Fatigue": 5, "Fever": 10},
            "Neurozil": {"Migraine": 15, "Eye Irritation": -5},
            "Cryostin": {"Chills": -5, "Fever": 10},
            "Throxil": {"Cough": -5, "Sore Throat": 15},
            "Dermavax": {"Eye Irritation": -5, "Skin Rash": 15},
            "Synaptix": {"Fainting": 15, "Hallucinations": -5},
            "Clairion": {"Blindness": -5, "Migraine": 10},
            "Xenoviralyn": {"Chills": 15, "Fever": -5},
            "Luxbane": {"Blindness": 15, "Migraine": -5},
            "Stabilon": {"Fainting": 10, "Vertigo": -5},
            "Zypheral": {"Sneezing": 15, "Cough": -5},
            "Paralynth": {"Paralysis": 15, "Muscle Pain": -5},
            "Vertigen": {"Fainting": -5, "Vertigo": 15},
            "Organilax": {"Paralysis": -5, "Coma": 5, "Organ Failure": 10},
            "Emetrolix": {"Nausea": -5, "Vomiting": 15},
            "Pulmovar": {"Sneezing": -5, "Cough": 10, "Sore Throat": 5},
            "Somnora": {"Coma": 15, "Organ Failure": -5},
            "Talorinex": {"Fatigue": -5, "Fever": 15},
            "Myonex": {"Paralysis": -5, "Muscle Pain": 15}
        };

        const allSymptoms = Object.keys(Object.values(ingredientTable).reduce((acc, curr) => ({...acc, ...curr}), {}));

        // Build Checkboxes
        const container = document.getElementById('checkboxGroup');
        allSymptoms.sort().forEach(s => {
            container.innerHTML += `<label class="sc-label"><input type="checkbox" class="sc" value="${s}">${s}</label>`;
        });

        function solve() {
            const selected = Array.from(document.querySelectorAll(".sc:checked")).map(i => i.value);
            if (!selected.length) return alert("Select symptoms!");

            const maxIng = parseInt(document.getElementById("maxIng").value) || 60;
            const limit = parseInt(document.getElementById("limit").value) || 5;
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "Searching for perfect balance...";

            let foundCures = new Set();
            let attempts = 0;

            while (foundCures.size < limit && attempts < 20000) {
                attempts++;
                let currentCombo = [];
                let totals = {};
                allSymptoms.forEach(s => totals[s] = 0);

                for (let i = 0; i < maxIng; i++) {
                    if (selected.every(s => totals[s] === 100)) {
                        foundCures.add(JSON.stringify(currentCombo.sort()));
                        break;
                    }

                    let target = selected.find(s => totals[s] < 100);
                    if (!target) break;

                    let gap = 100 - totals[target];
                    let ingredients = Object.keys(ingredientTable);

                    let candidates = ingredients.filter(ing => {
                        let val = ingredientTable[ing][target] || 0;
                        return val > 0 && val <= gap;
                    });

                    if (candidates.length === 0) {
                        candidates = ingredients.filter(ing => (ingredientTable[ing][target] || 0) > 0);
                    }

                    let pick = candidates[Math.floor(Math.random() * candidates.length)];
                    currentCombo.push(pick);
                    for (let s in ingredientTable[pick]) totals[s] += ingredientTable[pick][s];
                }
            }
            render(foundCures, resultsDiv, selected);
        }

        function render(set, container, selected) {
            container.innerHTML = set.size ? "" : "No exact matches. Increase max ingredients?";
            set.forEach(json => {
                const list = JSON.parse(json);
                const counts = {};
                list.forEach(x => counts[x] = (counts[x] || 0) + 1);
                let card = document.createElement("div");
                card.className = "card";
                let ings = Object.entries(counts).map(([n, c]) => `<div><b>${c}x</b> ${n}</div>`).join("");
                let stats = selected.map(s => {
                    let sum = list.reduce((a, b) => a + (ingredientTable[b][s] || 0), 0);
                    return `${s}: ${sum}%`;
                }).join(" | ");
                card.innerHTML = `${ings}<div style="margin-top:8px; color:#94a3b8; font-size:12px; border-top:1px solid #334155; padding-top:4px;">${stats}</div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
