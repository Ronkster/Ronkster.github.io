<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virus Solver Pro - Clean Build</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --line: #334155;
            --good: #4ade80;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid var(--line); }
        .sym-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 350px; overflow-y: auto; padding: 10px; background: #0f172a; border-radius: 8px; border: 1px solid var(--line); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        input { width: 70px; background: #0f172a; color: white; border: 1px solid var(--line); border-radius: 4px; padding: 6px; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .card { background: #020617; border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 12px; border-radius: 6px; }
        .muted { color: #94a3b8; font-size: 12px; }
        .badge { background: #334155; color: var(--accent); padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
        h2 { margin-top: 0; color: var(--accent); font-size: 1.2rem; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="grid">
    <div class="panel">
        <h2>1. Active Symptoms</h2>
        <div id="symptomList" class="sym-grid"></div>
        <h2 style="margin-top:20px;">2. Settings</h2>
        <div class="setting-row">Max Solutions <input type="number" id="limit" value="5"></div>
        <div class="setting-row">Max Ingredients <input type="number" id="maxIng" value="30"></div>
        <div class="setting-row">Time Limit (Sec) <input type="number" id="timeOut" value="5"></div>
        <button onclick="runSolver()">EXECUTE SEARCH ⚡</button>
        <div id="status" class="muted" style="margin-top:12px;">System Ready.</div>
    </div>
    <div class="panel">
        <h2>Results</h2>
        <div id="results"></div>
    </div>
</div>

<script>
const table = {
    Dermatrix: {"Eye Irritation":5,"Skin Rash":10,"Sneezing":-5},
    Neurovex: {"Fainting":-5,"Migraine":-5,"Hallucinations":15},
    Morvexis: {"Sneezing":-5,"Cough":15},
    Oculyte: {"Eye Irritation":10,"Skin Rash":-5},
    Lumicet: {"Migraine":-5,"Eye Irritation":15},
    Bronchex: {"Cough":10,"Sore Throat":-5},
    Myocordin: {"Fatigue":-5,"Paralysis":5,"Muscle Pain":10},
    Hallucor: {"Fainting":-5,"Hallucinations":15},
    Virexon: {"Nausea":15,"Vomiting":-5},
    Organex: {"Coma":-5,"Organ Failure":15},
    Velmorin: {"Fatigue":10,"Fever":-5},
    Trivexol: {"Chills":-5,"Fatigue":5,"Fever":10},
    Neurozil: {"Migraine":15,"Eye Irritation":-5},
    Cryostin: {"Chills":-5,"Fever":10},
    Throxil: {"Cough":-5,"Sore Throat":15},
    Dermavax: {"Eye Irritation":-5,"Skin Rash":15},
    Synaptix: {"Fainting":15,"Hallucinations":-5},
    Clairion: {"Blindness":-5,"Migraine":10},
    Xenoviralyn: {"Chills":15,"Fever":-5},
    Luxbane: {"Blindness":15,"Migraine":-5},
    Stabilon: {"Fainting":10,"Vertigo":-5},
    Zypheral: {"Sneezing":15,"Cough":-5},
    Paralynth: {"Paralysis":15,"Muscle Pain":-5},
    Vertigen: {"Fainting":-5,"Vertigo":15},
    Organilax: {"Paralysis":-5,"Coma":5,"Organ Failure":10},
    Emetrolix: {"Nausea":-5,"Vomiting":15},
    Pulmovar: {"Sneezing":-5,"Cough":10,"Sore Throat":5},
    Somnora: {"Coma":15,"Organ Failure":-5},
    Talorinex: {"Fatigue":-5,"Fever":15},
    Myonex: {"Paralysis":-5,"Muscle Pain":15}
};

const symptoms = Object.keys(table).reduce((acc, curr) => {
    Object.keys(table[curr]).forEach(s => { if(!acc.includes(s)) acc.push(s); });
    return acc;
}, []).sort();

const symDiv = document.getElementById("symptomList");
symptoms.forEach(s => {
    symDiv.innerHTML += `<label style="display:flex;align-items:center;gap:8px;padding:4px;"><input type="checkbox" class="sc" value="${s}"> ${s}</label>`;
});

function runSolver() {
    const selected = Array.from(document.querySelectorAll(".sc:checked")).map(i => i.value);
    if (!selected.length) return alert("Select symptoms!");

    const limit = parseInt(document.getElementById("limit").value);
    const maxI = parseInt(document.getElementById("maxIng").value);
    const timeLimit = parseInt(document.getElementById("timeOut").value);
    const deadline = performance.now() + (timeLimit * 1000);
    
    const resDiv = document.getElementById("results");
    const statusDiv = document.getElementById("status");
    resDiv.innerHTML = "";
    statusDiv.innerText = "Searching... ⚡";

    let foundCures = new Set();
    let attempts = 0;
    const ingredientNames = Object.keys(table);

    while (performance.now() < deadline && foundCures.size < limit) {
        attempts++;
        let currentCombo = [];
        let currentTotals = {};
        symptoms.forEach(s => currentTotals[s] = 0);

        // Initial Seed
        for(let i=0; i<3; i++) {
            let r = ingredientNames[Math.floor(Math.random()*ingredientNames.length)];
            currentCombo.push(r);
            for(let s in table[r]) currentTotals[s] += table[r][s];
        }

        // Tweak
        for(let iter=0; iter<80; iter++) {
            if(selected.every(s => currentTotals[s] >= 100)) {
                foundCures.add(JSON.stringify(currentCombo.sort()));
                break;
            }
            if(Math.random() < 0.5 && currentCombo.length < maxI) {
                let r = ingredientNames[Math.floor(Math.random()*ingredientNames.length)];
                currentCombo.push(r);
                for(let s in table[r]) currentTotals[s] += table[r][s];
            } else if(currentCombo.length > 1) {
                let idx = Math.floor(Math.random()*currentCombo.length);
                let removed = currentCombo.splice(idx, 1)[0];
                for(let s in table[removed]) currentTotals[s] -= table[removed][s];
            }
        }
    }

    statusDiv.innerText = `Done. Found ${foundCures.size} solutions.`;
    if(!foundCures.size) resDiv.innerHTML = "<p>No cures found. Increase ingredients or time.</p>";
    foundCures.forEach(json => {
        let list = JSON.parse(json);
        let counts = {};
        list.forEach(x => counts[x] = (counts[x] || 0) + 1);
        let html = `<div class="card">`;
        for(let n in counts) html += `<div><span class="badge">${counts[n]}x</span> ${n}</div>`;
        html += `<div class="muted" style="margin-top:8px;">Size: ${list.length}</div></div>`;
        resDiv.innerHTML += html;
    });
}
</script>
</body>
</html>
