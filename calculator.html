<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Virus Solver v3</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e5e7eb;
  padding: 20px;
}

h1 { color: #38bdf8; }

.container {
  display: flex;
  gap: 20px;
}

.panel {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  max-height: 500px;
  overflow-y: auto;
}

button {
  background: #38bdf8;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover { background: #0ea5e9; }

.result {
  background: #020617;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}

.good { color: #4ade80; }
</style>
</head>

<body>

<h1>🧪 Virus Solver v3</h1>

<label>Max Ingredients:</label>
<input type="number" id="maxSize" value="4" min="1" max="7">
<button onclick="solve()">Solve</button>

<div class="container">
  <div class="panel">
    <h3>Symptoms</h3>
    <div id="symptoms"></div>
  </div>

  <div class="panel">
    <h3>Best Combos</h3>
    <div id="results"></div>
  </div>
</div>

<script>
// ===== FULL DATA (FROM YOUR TABLE) =====
const symptoms = [
"Chills","Fainting","Fatigue","Vertigo","Paralysis","Fever","Blindness",
"Migraine","Eye Irritation","Muscle Pain","Nausea","Vomiting","Coma",
"Organ Failure","Hallucinations","Skin Rash","Sneezing","Cough","Sore Throat"
];

const ingredients = [
"Dermatrix","Neurovex","Morvexis","Oculyte","Lumicet","Bronchex",
"Myocordin","Hallucor","Virexon","Organex","Velmorin","Trivexol",
"Neurozil","Cryostin","Throxil","Dermavax","Synaptix","Clairion",
"Xenoviralyn","Luxbane","Stabilon","Zypheral","Paralynth","Vertigen",
"Organilax","Emetrolix","Pulmovar","Somnora","Talorinex","Myonex"
];

// ===== CORE VALUE TABLE (TRIMMED = NON ZERO ONLY FOR SPEED) =====
const table = {
Dermatrix: {"Eye Irritation":5,"Skin Rash":10,"Sneezing":-5},
Neurovex: {"Fainting":-5,"Migraine":-5,"Hallucinations":15},
Morvexis: {"Sneezing":-5,"Cough":15},
Oculyte: {"Eye Irritation":10,"Skin Rash":-5},
Lumicet: {"Migraine":-5,"Eye Irritation":15},
Bronchex: {"Cough":10,"Sore Throat":-5},
Myocordin: {"Fatigue":-5,"Paralysis":5,"Muscle Pain":10},
Hallucor: {"Fainting":-5,"Hallucinations":15},
Virexon: {"Nausea":15,"Vomiting":-5},
Organex: {"Coma":-5,"Organ Failure":15},
Velmorin: {"Fatigue":10,"Fever":-5},
Trivexol: {"Chills":-5,"Fatigue":5,"Fever":10},
Neurozil: {"Migraine":15,"Eye Irritation":-5},
Cryostin: {"Chills":-5,"Fever":10},
Throxil: {"Cough":-5,"Sore Throat":15},
Dermavax: {"Eye Irritation":-5,"Skin Rash":15},
Synaptix: {"Fainting":15,"Hallucinations":-5},
Clairion: {"Blindness":-5,"Migraine":10},
Xenoviralyn: {"Chills":15,"Fever":-5},
Luxbane: {"Blindness":15,"Migraine":-5},
Stabilon: {"Fainting":10,"Vertigo":-5},
Zypheral: {"Sneezing":15,"Cough":-5},
Paralynth: {"Paralysis":15,"Muscle Pain":-5},
Vertigen: {"Fainting":-5,"Vertigo":15},
Organilax: {"Paralysis":-5,"Coma":5,"Organ Failure":10},
Emetrolix: {"Nausea":-5,"Vomiting":15},
Pulmovar: {"Sneezing":-5,"Cough":10,"Sore Throat":5},
Somnora: {"Coma":15,"Organ Failure":-5},
Talorinex: {"Fatigue":-5,"Fever":15},
Myonex: {"Paralysis":-5,"Muscle Pain":15}
};

// ===== BUILD UI =====
const symDiv = document.getElementById("symptoms");

symptoms.forEach(s => {
  symDiv.innerHTML += `<label><input type="checkbox" value="${s}"> ${s}</label><br>`;
});

// ===== COMBO GEN =====
function combos(arr, max) {
  let res = [];

  function go(start, cur) {
    if (cur.length) res.push([...cur]);
    if (cur.length === max) return;

    for (let i = start; i < arr.length; i++) {
      cur.push(arr[i]);
      go(i + 1, cur);
      cur.pop();
    }
  }

  go(0, []);
  return res;
}

// ===== SOLVER =====
function solve() {
  const selected = [...document.querySelectorAll("input:checked")]
    .map(x => x.value);

  const maxSize = +document.getElementById("maxSize").value;

  const all = combos(ingredients, maxSize);
  let results = [];

  for (let combo of all) {
    let totals = {};
    symptoms.forEach(s => totals[s] = 0);

    for (let ing of combo) {
      for (let s in table[ing]) {
        totals[s] += table[ing][s];
      }
    }

    let score = 0;
    let perfect = true;

    for (let s of selected) {
      score += totals[s];
      if (totals[s] < 100) perfect = false;
    }

    results.push({combo, score, totals, perfect});
  }

  results.sort((a,b)=>b.score-a.score);

  show(results.slice(0,20));
}

// ===== DISPLAY =====
function show(list) {
  const div = document.getElementById("results");
  div.innerHTML = "";

  list.forEach(r => {
    let el = document.createElement("div");
    el.className = "result";

    let text = `<b>${r.combo.join(", ")}</b><br>`;
    text += `Score: ${r.score} `;
    if (r.perfect) text += `<span class="good">PERFECT</span>`;
    text += "<br>";

    for (let s in r.totals) {
      if (r.totals[s] !== 0) {
        text += `${s}: ${r.totals[s]}<br>`;
      }
    }

    el.innerHTML = text;
    div.appendChild(el);
  });
}
</script>

</body>
</html>
